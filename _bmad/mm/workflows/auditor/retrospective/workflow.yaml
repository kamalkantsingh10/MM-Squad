# Retrospective - Sprint Summary & Learnings
name: retrospective
description: "Generate sprint summary, identify learnings, post to Epic"

config_source: "{project-root}/_bmad/mm/config.yaml"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
